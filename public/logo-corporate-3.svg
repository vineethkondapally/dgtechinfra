<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corpGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 12: Minimal Geometric + Wordmark (Premium) -->
  <!-- Represents: Luxury, professional, premium services -->
  
  <!-- Geometric accent: Three horizontal lines (layers/levels) -->
  <line x1="8" y1="20" x2="28" y2="20" stroke="url(#corpGrad3)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="30" x2="28" y2="30" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="8" y1="40" x2="28" y2="40" stroke="url(#corpGrad3)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Spacer -->
  <rect x="35" y="20" width="1" height="20" fill="#FFD700" opacity="0.3"/>
  
  <!-- Main Company Name -->
  <text x="50" y="44" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="800" fill="url(#corpGrad3)" letter-spacing="-1.5">
    DG techinfra
  </text>
</svg>