<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corpGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 11: Corporate Icon + Text (Modern Box) -->
  <!-- Represents: Tech-forward, structured, professional -->
  
  <!-- Icon: Nested squares (stability, layers, tech) -->
  <rect x="8" y="14" width="28" height="28" fill="none" stroke="url(#corpGrad2)" stroke-width="2" rx="2"/>
  <rect x="14" y="20" width="16" height="16" fill="none" stroke="#FFD700" stroke-width="2" rx="1"/>
  <rect x="18" y="24" width="8" height="8" fill="#FFD700" opacity="0.7" rx="1"/>
  
  <!-- Vertical divider -->
  <line x1="45" y1="15" x2="45" y2="55" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Company Text -->
  <text x="55" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#001f4d" letter-spacing="-0.3">
    DG
  </text>
  
  <text x="90" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#001f4d" letter-spacing="0">
    techinfra
  </text>
  
  <!-- Bottom accent line -->
  <line x1="55" y1="50" x2="280" y2="50" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
</svg>