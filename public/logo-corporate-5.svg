<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corp14grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 14: Geometric Circle Badge -->
  <!-- Represents: Modern, circular, complete/unified -->
  
  <!-- Outer Circle (Navy gradient) -->
  <circle cx="24" cy="30" r="18" fill="url(#corp14grad)"/>
  
  <!-- Inner Circle (Gold accent) -->
  <circle cx="24" cy="30" r="14" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  
  <!-- DG Text inside circle -->
  <text x="24" y="35" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">
    DG
  </text>
  
  <!-- Three gold dots below circle (representing technology/connection) -->
  <circle cx="16" cy="54" r="1.5" fill="#FFD700"/>
  <circle cx="24" cy="54" r="1.5" fill="#FFD700"/>
  <circle cx="32" cy="54" r="1.5" fill="#FFD700"/>
  
  <!-- Company Name -->
  <text x="55" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#001f4d" letter-spacing="-0.5">
    techinfra
  </text>
  
  <!-- Subtext: Connected tag -->
  <text x="55" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="600" fill="#FFD700" letter-spacing="1">
    CONNECTED SOLUTIONS
  </text>
</svg>