<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="100%" height="100%" style="background: transparent;">
    <defs>
        <style>
            .brand-title { font-family: 'Montserrat', 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 58px; fill: #1a4d7a; text-anchor: middle; letter-spacing: -1px; }
            .brand-sub { font-family: 'Montserrat', 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 14px; fill: #333333; text-anchor: middle; letter-spacing: 0.5px; }
            .brand-link { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; font-size: 16px; fill: #1a4d7a; text-anchor: middle; letter-spacing: 0.5px; }
        </style>
    </defs>
    
    <!-- Main Circular Container -->
    <g transform="translate(300, 150)">
        <!-- Outer Circle Background -->
        <circle cx="0" cy="0" r="110" fill="none" stroke="#f0f0f0" stroke-width="1"/>
        
        <!-- LEFT HEMISPHERE (BLUE - GLOBE/TECHNOLOGY) -->
        <g>
            <!-- Left outer circle arc -->
            <path d="M 0,-110 A 110,110 0 0,0 0,110 L -10,100 A 100,100 0 0,1 0,-100 Z" fill="#1a4d7a" opacity="0.15"/>
            
            <!-- Curved leaf shape - top left -->
            <path d="M -30,-80 Q -60,-60 -70,-20 Q -60,-40 -35,-65 Z" fill="#1a4d7a"/>
            
            <!-- Curved wave - middle left -->
            <path d="M -50,-10 Q -80,0 -85,40 Q -75,20 -45,5 Z" fill="#1a4d7a"/>
            
            <!-- Building structure - left side -->
            <path d="M -25,-40 L -10,-50 L -5,-30 L -20,-25 Z" fill="#1a4d7a"/>
            <path d="M -35,0 L -15,-10 L -12,20 L -32,15 Z" fill="#1a4d7a"/>
            
            <!-- Globe line segments -->
            <path d="M -35,-75 Q -45,-45 -40,-10" fill="none" stroke="#1a4d7a" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
            <path d="M -15,-85 Q -30,-60 -32,0" fill="none" stroke="#1a4d7a" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </g>
        
        <!-- RIGHT HEMISPHERE (ORANGE - INFRASTRUCTURE) -->
        <g>
            <!-- Right outer circle arc -->
            <path d="M 0,-110 A 110,110 0 0,1 0,110 L 10,100 A 100,100 0 0,0 0,-100 Z" fill="#f28f1d" opacity="0.15"/>
            
            <!-- Building tower 1 - top right -->
            <path d="M 20,-60 L 45,-45 L 40,-10 L 15,-25 Z" fill="#f28f1d"/>
            
            <!-- Building tower 2 - middle right -->
            <path d="M 50,-30 L 75,-15 L 70,35 L 45,25 Z" fill="#f28f1d"/>
            
            <!-- Curved structure - bottom right -->
            <path d="M 30,30 Q 65,45 80,70 Q 70,50 40,35 Z" fill="#f28f1d"/>
            
            <!-- Accent triangle -->
            <path d="M 60,-50 L 85,-35 L 75,-55 Z" fill="#f28f1d" opacity="0.9"/>
            
            <!-- Infrastructure curves -->
            <path d="M 35,-70 Q 55,-55 70,-20" fill="none" stroke="#f28f1d" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
            <path d="M 55,-75 Q 70,-50 75,10" fill="none" stroke="#f28f1d" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
        </g>
        
        <!-- CENTER GEOMETRIC ELEMENTS -->
        <g>
            <!-- Center vertical pillar -->
            <path d="M -8,-90 L 8,-90 L 5,70 L -5,70 Z" fill="#1a4d7a"/>
            
            <!-- Horizontal bridge element -->
            <path d="M -70,-5 L 70,15 L 65,35 L -65,15 Z" fill="#f28f1d"/>
            
            <!-- Connecting nodes -->
            <circle cx="-8" cy="-20" r="4" fill="#f28f1d"/>
            <circle cx="8" cy="20" r="4" fill="#1a4d7a"/>
            <circle cx="0" cy="5" r="3" fill="#1a4d7a" opacity="0.6"/>
        </g>
        
        <!-- OUTER DECORATIVE RING -->
        <circle cx="0" cy="0" r="110" fill="none" stroke="#1a4d7a" stroke-width="3" opacity="0.3"/>
        <circle cx="0" cy="0" r="105" fill="none" stroke="#f28f1d" stroke-width="2" opacity="0.2"/>
    </g>
    
    <!-- TEXT SECTION -->
    <text x="300" y="500" class="brand-title">dgtechinfra</text>
    
    <!-- Divider line -->
    <line x1="150" y1="520" x2="450" y2="520" stroke="#f28f1d" stroke-width="2" opacity="0.4"/>
    
    <!-- Subtitle -->
    <text x="300" y="560" class="brand-sub">DHRITI GLOBAL TECHNOLOGIES AND</text>
    <text x="300" y="585" class="brand-sub">INFRASTRUCTURE PVT. LIMITED</text>
    
    <!-- Divider line -->
    <line x1="180" y1="603" x2="420" y2="603" stroke="#1a4d7a" stroke-width="1" opacity="0.2"/>
    
    <!-- Website -->
    <text x="300" y="645" class="brand-link">dgtechinfra.com</text>
</svg>