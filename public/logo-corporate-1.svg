<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corpGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 10: Modern Corporate Wordmark with Underline -->
  <!-- Represents: Clean, professional, corporate credibility -->
  
  <!-- Primary Text: DG -->
  <text x="50" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="900" fill="url(#corpGrad1)" letter-spacing="-2">
    DG
  </text>
  
  <!-- Secondary Text: techinfra -->
  <text x="110" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#001f4d" letter-spacing="-0.5">
    techinfra
  </text>
  
  <!-- Underline with accent -->
  <line x1="50" y1="50" x2="230" y2="50" stroke="url(#corpGrad1)" stroke-width="2"/>
  <rect x="50" y="52" width="180" height="2" fill="#FFD700"/>
  
  <!-- Optional: Subtle geometric element (vertical bar) -->
  <rect x="42" y="32" width="2" height="28" fill="#FFD700" opacity="0.6"/>
</svg>