<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corp16grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 16: Modern Monogram (Diamond style) -->
  <!-- Represents: Premium, sophisticated, established -->
  
  <!-- Diamond shape outer (Navy) -->
  <polygon points="24,6 42,24 24,42 6,24" fill="url(#corp16grad)"/>
  
  <!-- Inner diamond (Gold) -->
  <polygon points="24,11 37,24 24,37 11,24" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.5"/>
  
  <!-- DG Monogram -->
  <text x="24" y="29" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">
    DG
  </text>
  
  <!-- Company name (sleek, modern) -->
  <text x="55" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="800" fill="#001f4d" letter-spacing="-1">
    techinfra
  </text>
  
  <!-- Decorative line below -->
  <line x1="55" y1="48" x2="155" y2="48" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
</svg>