<svg width="240" height="60" viewBox="0 0 240 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="conceptCGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT C: Minimalist Icon + Wordmark -->
  <!-- Angular hexagon/diamond icon (represents growth & technology) -->
  
  <!-- Outer hexagon frame (Navy) -->
  <polygon points="18,6 28,10 28,22 18,26 8,22 8,10" 
           fill="none" stroke="url(#conceptCGradient)" stroke-width="2"/>
  
  <!-- Inner hexagon accent (Gold) -->
  <polygon points="18,10 24,13 24,19 18,22 12,19 12,13" 
           fill="#FFD700" opacity="0.8"/>
  
  <!-- Center dot (emphasizes tech/core) -->
  <circle cx="18" cy="16" r="2.5" fill="#001f4d"/>
  
  <!-- Upper extension - angular upward arrow element -->
  <path d="M 18 6 L 22 1 L 20 4 Z" 
        fill="#FFD700" opacity="0.9"/>
  
  <!-- Company name -->
  <text x="58" y="32" font-family="'Segoe UI', 'Arial', sans-serif" font-size="20" font-weight="700" fill="#001f4d" letter-spacing="-0.5">
    DHRITI
  </text>
  <text x="58" y="48" font-family="'Segoe UI', 'Arial', sans-serif" font-size="12" font-weight="600" fill="#FFD700">
    GLOBAL
  </text>
</svg>