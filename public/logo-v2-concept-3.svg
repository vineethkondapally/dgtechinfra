<svg width="280" height="70" viewBox="0 0 280 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="practicalGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 3: Interconnected Nodes + Building Structure -->
  <!-- Represents: Connected ecosystem (tech, infrastructure, manufacturing, real estate) -->
  
  <!-- Left Column: Tech Nodes (vertical stack) -->
  <circle cx="10" cy="10" r="3.5" fill="url(#practicalGrad3)"/>
  <circle cx="10" cy="22" r="3.5" fill="url(#practicalGrad3)"/>
  <circle cx="10" cy="34" r="3.5" fill="url(#practicalGrad3)"/>
  
  <!-- Right Column: Infrastructure Nodes -->
  <circle cx="38" cy="10" r="3.5" fill="url(#practicalGrad3)"/>
  <circle cx="38" cy="22" r="3.5" fill="url(#practicalGrad3)"/>
  <circle cx="38" cy="34" r="3.5" fill="url(#practicalGrad3)"/>
  
  <!-- Center: Integration Hub (Gold) -->
  <circle cx="24" cy="22" r="5" fill="#FFD700" opacity="0.95"/>
  <circle cx="24" cy="22" r="3" fill="url(#practicalGrad3)"/>
  
  <!-- Connection Lines (Gold strokes) -->
  <line x1="13" y1="10" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="13" y1="22" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="13" y1="34" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  
  <line x1="35" y1="10" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="35" y1="22" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  <line x1="35" y1="34" x2="24" y2="22" stroke="#FFD700" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
  
  <!-- Outer Building Frame (subtle) -->
  <rect x="6" y="6" width="36" height="32" fill="none" stroke="url(#practicalGrad3)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Company Name: dgtechinfra -->
  <text x="52" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#001f4d" letter-spacing="-0.8">
    dgtechinfra
  </text>
  
  <!-- Tagline -->
  <text x="52" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#5a7a8f" letter-spacing="0.5">
    INTEGRATED MULTI-SECTOR SOLUTIONS
  </text>
</svg>