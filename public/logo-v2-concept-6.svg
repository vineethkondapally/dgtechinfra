<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brighter, more vibrant gradients -->
    <linearGradient id="v2grad3bright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2d66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a4d99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 6: Bridge Connecting Two Elements (Enhanced) -->
  <!-- Represents: Bridging gap between technology and physical infrastructure -->
  
  <!-- Left Tower (Tech - Abstract) - Brighter -->
  <rect x="6" y="20" width="4" height="20" fill="url(#v2grad3bright)" opacity="1"/>
  <rect x="11" y="12" width="4" height="28" fill="url(#v2grad3bright)" opacity="1"/>
  <circle cx="8" cy="15" r="2.5" fill="#FFC107" opacity="1"/>
  <circle cx="13" cy="18" r="2.5" fill="#FFC107" opacity="1"/>
  
  <!-- Right Tower (Infrastructure - Solid) - Brighter -->
  <rect x="30" y="20" width="4" height="20" fill="url(#v2grad3bright)" opacity="1"/>
  <rect x="25" y="12" width="4" height="28" fill="url(#v2grad3bright)" opacity="1"/>
  <circle cx="32" cy="15" r="2.5" fill="#FFC107" opacity="1"/>
  <circle cx="27" cy="18" r="2.5" fill="#FFC107" opacity="1"/>
  
  <!-- Bridge Connecting (Bright Gold) - Thicker, more prominent -->
  <rect x="10" y="18" width="20" height="4" fill="url(#goldGradient)" opacity="1" rx="1"/>
  <polygon points="12,16 16,12 20,16 16,20" fill="#FFC107" opacity="1"/>
  <polygon points="26,16 30,12 34,16 30,20" fill="#FFC107" opacity="1"/>
  
  <!-- Bridge support struts (Gold lines) -->
  <line x1="12" y1="18" x2="12" y2="25" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="30" y1="18" x2="30" y2="25" stroke="#FFD700" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Foundation Base (Navy) - Brighter -->
  <rect x="6" y="40" width="28" height="5" fill="url(#v2grad3bright)" opacity="1" rx="1"/>
  
  <!-- Decorative shadow/depth line -->
  <rect x="6" y="44" width="28" height="1" fill="#FFD700" opacity="0.4"/>
  
  <!-- Company Name: DG techinfra -->
  <text x="68" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#0a2d66" letter-spacing="-0.5">
    DG
  </text>
  <text x="104" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" fill="#1a4d99" letter-spacing="0">
    techinfra
  </text>
  
  <!-- Tagline - Brighter gold -->
  <text x="68" y="57" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" fill="#FFC107" letter-spacing="0.8">
    CONNECTING SOLUTIONS
  </text>
</svg>