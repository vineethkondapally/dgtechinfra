<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="corp17grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a3f7f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- CONCEPT 17: Square with Rotated Inner Badge -->
  <!-- Represents: Modern, dynamic, structured -->
  
  <!-- Outer square (Navy) -->
  <rect x="8" y="14" width="32" height="32" fill="url(#corp17grad)" rx="4"/>
  
  <!-- Inner rotated square (Gold outline) -->
  <g transform="translate(24, 30)">
    <polygon points="0,-9 9,0 0,9 -9,0" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.7"/>
  </g>
  
  <!-- DG Text -->
  <text x="24" y="36" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-1">
    DG
  </text>
  
  <!-- Company Name: DGtechinfra (NO SPACE) -->
  <text x="48" y="42" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#001f4d" letter-spacing="-1.2">
    techinfra
  </text>
  
  <!-- Tagline: Connecting Solutions -->
  <text x="48" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#FFD700" letter-spacing="0.5">
    CONNECTING SOLUTIONS
  </text>
</svg>