<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="100%" height="100%" style="background: transparent;">
    <style>
        .brand-title { font-family: 'Montserrat', 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 58px; fill: #0f4c81; text-anchor: middle; letter-spacing: -1.5px; }
        .brand-sub { font-family: 'Montserrat', 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 14px; fill: #475569; text-anchor: middle; letter-spacing: 0.5px; }
        .brand-link { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 18px; fill: #0f4c81; text-anchor: middle; letter-spacing: 1px; }
    </style>
    
    <!-- Logo Emblem -->
    <g transform="translate(50, 20)">
        
        <g id="EmblemSymbol">
            <!-- Outer Spherical Tech Ring - Left Hemisphere (Primary Blue Color) -->
            <path d="M 230,100 C 145,100 100,165 100,250 C 100,335 145,400 230,400" 
                  fill="none" stroke="#0f4c81" stroke-width="12" stroke-linecap="round" />
            <!-- Intersecting tech network curves inside Left Hemisphere -->
            <path d="M 105,210 C 145,225 175,200 220,160" fill="none" stroke="#0f4c81" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 10" />
            <path d="M 105,290 C 145,275 175,300 220,340" fill="none" stroke="#0f4c81" stroke-width="6" stroke-linecap="round" />
            <path d="M 150,135 C 195,170 195,220 180,270" fill="none" stroke="#0f4c81" stroke-width="6" stroke-linecap="round" />
            <path d="M 160,360 C 190,320 210,310 225,280" fill="none" stroke="#0f4c81" stroke-width="6" stroke-linecap="round" />
            
            <!-- Outer Spherical Tech Ring - Right Hemisphere (Accent Orange Color) -->
            <path d="M 270,100 C 355,100 400,165 400,250 C 400,335 355,400 270,400" 
                  fill="none" stroke="#f28f1d" stroke-width="12" stroke-linecap="round" />
            <!-- Intersecting structural curves inside Right Hemisphere -->
            <path d="M 395,210 C 355,225 325,200 280,160" fill="none" stroke="#f28f1d" stroke-width="6" stroke-linecap="round" />
            <path d="M 395,290 C 355,275 325,300 280,340" fill="none" stroke="#f28f1d" stroke-width="6" stroke-linecap="round" stroke-dasharray="1 10" />
            <path d="M 350,135 C 305,170 305,220 320,270" fill="none" stroke="#f28f1d" stroke-width="6" stroke-linecap="round" />
            <path d="M 340,360 C 310,320 290,310 275,280" fill="none" stroke="#f28f1d" stroke-width="6" stroke-linecap="round" />

            <!-- Dynamic Central Skyscraper & Tech Structure Interlocking -->
            <!-- Central Main Pillar - Dark Blue (Structural Infrastructure) -->
            <path d="M 240,80 L 260,80 L 260,350 L 240,330 Z" fill="#0f4c81" />
            <path d="M 260,80 L 270,85 L 270,350 L 260,350 Z" fill="#0f4c81" opacity="0.85" />
            
            <!-- Intersecting "T" Block Structure - Vibrant Orange (Technologies) -->
            <!-- Angular crossbeam crossing the central pillar -->
            <path d="M 215,220 L 305,150 L 315,163 L 225,233 Z" fill="#f28f1d" />
            <!-- Orange vertical secondary support post -->
            <path d="M 280,170 L 300,170 L 300,380 L 280,380 Z" fill="#f28f1d" />
            <!-- Depth shadows/bevels on the Orange beam -->
            <path d="M 300,170 L 308,175 L 308,380 L 300,380 Z" fill="#f28f1d" opacity="0.8" />
            <path d="M 215,220 L 225,233 L 225,320 L 215,310 Z" fill="#0f4c81" />
        </g>
    
    </g>

    <!-- Text Layout -->
    <text x="300" y="495" class="brand-title">dgtechinfra</text>
    
    <!-- Custom multi-line parsing for long subtitles to guarantee responsive presentation -->
    
    <text x="300" y="540" class="brand-sub" fill="#475569">DHRITI GLOBAL TECHNOLOGIES AND</text>
    <text x="300" y="565" class="brand-sub" fill="#475569">INFRASTRUCTURE PVT. LIMITED</text>

    
    <text x="300" y="625" class="brand-link">dgtechinfra.com</text>
</svg>