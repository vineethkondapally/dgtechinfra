<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#f5f5f5" stroke="#0d3b66" stroke-width="2"/>
  
  <!-- Left Circle (Blue) -->
  <circle cx="70" cy="100" r="30" fill="none" stroke="#0d3b66" stroke-width="3"/>
  
  <!-- Right Circle (Orange) -->
  <circle cx="110" cy="100" r="30" fill="none" stroke="#ea8c2e" stroke-width="3"/>
  
  <!-- Overlap section with gradient effect -->
  <ellipse cx="90" cy="100" rx="10" ry="30" fill="rgba(237, 140, 46, 0.3)"/>
  
  <!-- Arrow pointing right -->
  <g transform="translate(125, 100)">
    <line x1="0" y1="0" x2="15" y2="0" stroke="#ea8c2e" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="15,0 11,3 11,-3" fill="#ea8c2e"/>
  </g>
  
  <!-- Small accent circles -->
  <circle cx="85" cy="85" r="3" fill="#0d3b66"/>
  <circle cx="95" cy="90" r="3" fill="#ea8c2e"/>
  <circle cx="90" cy="110" r="3" fill="#0d3b66"/>
</svg>