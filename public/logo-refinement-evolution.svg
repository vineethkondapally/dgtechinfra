<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular Background -->
  <circle cx="100" cy="100" r="95" fill="#f5f5f5" stroke="#0d3b66" stroke-width="2"/>
  
  <!-- Outer Circle Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#ea8c2e" stroke-width="3"/>
  
  <!-- Globe/World Base (Blue) -->
  <circle cx="85" cy="95" r="35" fill="none" stroke="#0d3b66" stroke-width="2.5"/>
  
  <!-- Globe sections -->
  <path d="M 85 60 Q 95 60 100 70 Q 100 95 95 110 Q 85 115 75 110 Q 70 95 70 70 Q 75 60 85 60" 
        fill="none" stroke="#0d3b66" stroke-width="2" opacity="0.7"/>
  
  <!-- Building/Tower (Orange) -->
  <g transform="translate(110, 90)">
    <!-- Main building -->
    <rect x="-8" y="-20" width="16" height="35" fill="#ea8c2e"/>
    <!-- Windows -->
    <rect x="-6" y="-18" width="3" height="3" fill="#0d3b66"/>
    <rect x="0" y="-18" width="3" height="3" fill="#0d3b66"/>
    <rect x="4" y="-18" width="3" height="3" fill="#0d3b66"/>
    <rect x="-6" y="-12" width="3" height="3" fill="#0d3b66"/>
    <rect x="0" y="-12" width="3" height="3" fill="#0d3b66"/>
    <rect x="4" y="-12" width="3" height="3" fill="#0d3b66"/>
    <rect x="-6" y="-6" width="3" height="3" fill="#0d3b66"/>
    <rect x="0" y="-6" width="3" height="3" fill="#0d3b66"/>
    <rect x="4" y="-6" width="3" height="3" fill="#0d3b66"/>
  </g>
  
  <!-- Growth Arrow (Orange) -->
  <g transform="translate(95, 75)">
    <line x1="-8" y1="15" x2="8" y2="-5" stroke="#ea8c2e" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="8,-5 5,-8 10,-12" fill="#ea8c2e"/>
  </g>
</svg>