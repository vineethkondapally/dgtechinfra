<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="#f5f5f5" stroke="#8b8b8b" stroke-width="2"/>
  
  <!-- Outer Weave Ring 1 -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#8b8b8b" stroke-width="2" opacity="0.6"/>
  
  <!-- Outer Weave Ring 2 -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#8b8b8b" stroke-width="2" opacity="0.5"/>
  
  <!-- Weave Pattern - Horizontal lines -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  <line x1="30" y1="130" x2="170" y2="130" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Weave Pattern - Vertical lines -->
  <line x1="70" y1="30" x2="70" y2="170" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="30" x2="100" y2="170" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="30" x2="130" y2="170" stroke="#8b8b8b" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Weave Pattern - Diagonal lines -->
  <line x1="40" y1="40" x2="160" y2="160" stroke="#8b8b8b" stroke-width="1.5" opacity="0.3"/>
  <line x1="160" y1="40" x2="40" y2="160" stroke="#8b8b8b" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Center Circle Shield -->
  <circle cx="100" cy="100" r="30" fill="#8b8b8b" opacity="0.1" stroke="#8b8b8b" stroke-width="1.5"/>
  
  <!-- DGT Letters in center -->
  <text x="100" y="108" font-size="32" font-weight="bold" fill="#0d3b66" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="1">DGT</text>
</svg>